name: Update Munster living report

on:
  schedule:
    # Every Monday at 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run OpenAlex crawl (resumable, budget-aware)
        run: node munster-report/crawl.js

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add munster-report/data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update Munster living report data"
            git push
          fi
